[project]
name = "policy-interrogator"
version = "0.1.0"
description = "RAG pipeline for insurance policy document analysis"
requires-python = ">=3.11"

dependencies = [
    "pdfplumber==0.11.9",
    "chromadb==1.5.9",
    "langchain==1.3.9",
    "langchain-core==1.4.7",
    "langchain-ollama==1.1.0",
    "langchain-chroma==1.1.0",
    "streamlit==1.58.0",
    "pandas==3.0.2",
    "python-dotenv>=1.0",
    "tqdm>=4.67",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]